name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/growmedia

            # 기존 프로세스 종료
            PID=$(pgrep -f "growmedia.*jar")
            if [ -n "$PID" ]; then
              kill $PID
              sleep 2
            fi

            # 코드 pull (application.properties 유지)
            git stash
            git pull origin master
            git stash pop

            # 빌드
            ./gradlew clean build -x test

            # 백그라운드 실행
            nohup java -jar build/libs/growmedia-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
