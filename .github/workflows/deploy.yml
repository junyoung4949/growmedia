name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            cd ~/growmedia

            # 코드 pull (application.properties 유지)
            git stash
            git pull origin master
            git stash pop

            # 빌드
            ./gradlew clean build -x test

            # start.sh로 재시작 위임 (세션 분리)
            bash /home/ubuntu/growmedia/start.sh