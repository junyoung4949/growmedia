name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            cd ~/growmedia

            # 코드 pull (application.properties 유지)
            git stash
            git pull origin master
            git stash pop

            # 빌드
            ./gradlew clean build -x test

            # 기존 프로세스 종료 (SSH 세션 안 건드리게 정확하게)
            pkill -f "growmedia-0.0.1-SNAPSHOT.jar" || true

            sleep 2

            # 백그라운드 실행 (세션과 완전 분리)
            nohup java -jar build/libs/growmedia-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            disown $!